<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Driver95 — Code 95 Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="home" class="screen active">
      <div class="hero card">
        <div class="badge">MVP</div>
        <h1>Driver95</h1>
        <p id="subtitle" class="subtitle">Code 95 Trainer. Ohne Registrierung. Einfach Fragen.</p>

        <div class="languageBlock">
          <div id="languageTitle" class="sectionTitle">Sprache / база вопросов</div>
          <div class="languageGrid">
            <button id="langDe" class="langBtn" data-lang="de">🇩🇪 Deutsch<br><span>Austria · 298</span></button>
            <button id="langRu" class="langBtn" data-lang="ru">🇷🇺 Русский<br><span>StarTruck · 245</span></button>
          </div>
        </div>

        <div class="progressBlock">
          <div class="progressText"><span id="homeProgressText">0%</span><span id="homeScoreText">0 / 0</span></div>
          <div class="bar"><div id="homeBar"></div></div>
        </div>
        <button id="continueBtn" class="primary">Lernen fortsetzen</button>
        <div class="grid2">
          <button id="examBtn">Prüfung: 40 Fragen</button>
          <button id="mistakesBtn">Fehler wiederholen</button>
          <button id="randomBtn">Zufällige Fragen</button>
          <button id="resetBtn" class="danger">Fortschritt löschen</button>
        </div>
      </div>
    </section>

    <section id="quiz" class="screen">
      <header class="topbar">
        <button id="backBtn" class="iconBtn">←</button>
        <div>
          <div id="modeTitle" class="modeTitle">Lernen</div>
          <div id="questionMeta" class="meta"></div>
        </div>
      </header>

      <div class="card questionCard">
        <div class="statsRow">
          <span id="counter">Frage 1</span>
          <span id="score">✓ 0 ✕ 0</span>
        </div>
        <div class="bar small"><div id="quizBar"></div></div>
        <h2 id="questionText"></h2>
        <img id="questionImage" class="questionImage hidden" alt="Question image" />
        <div id="answers" class="answers"></div>
        <div id="feedback" class="feedback hidden"></div>
        <button id="nextBtn" class="primary hidden">Weiter →</button>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
