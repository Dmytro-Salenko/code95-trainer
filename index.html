<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#111827" />
  <title>Driver95 — Code 95 Trainer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="onboarding" class="screen active">
      <div class="hero card onboardingCard">
        <h1>Driver95</h1>
        <p class="subtitle">Code 95 Trainer</p>

        <div class="choiceGroup">
          <button id="langDe" class="choiceBtn" type="button">Deutsch</button>
          <button id="langRu" class="choiceBtn" type="button">Русский</button>
        </div>

        <div class="choiceGroup">
          <button id="themeLight" class="choiceBtn" type="button">Light</button>
          <button id="themeDark" class="choiceBtn" type="button">Dark</button>
        </div>

        <button id="onboardingContinue" class="primary" type="button">Continue</button>
      </div>
    </section>

    <section id="home" class="screen">
      <div class="hero card">
        <button id="changeLangBtn" class="iconBtn langBack" type="button">←</button>
        <div class="badge" id="langBadge">DE</div>
        <h1>Driver95</h1>
        <p id="homeSubtitle" class="subtitle">Code 95 Trainer</p>
        <div class="progressBlock">
          <div class="progressText"><span id="homeProgressText">0%</span><span id="homeScoreText">0 / 0</span></div>
          <div class="bar"><div id="homeBar"></div></div>
        </div>
        <button id="continueBtn" class="primary" type="button">Lernen fortsetzen</button>
        <div class="grid2">
          <button id="examBtn" type="button">Prüfung (40 Fragen)</button>
          <button id="mistakesBtn" type="button">Fehler wiederholen</button>
          <button id="randomBtn" type="button">Zufällige Fragen</button>
          <button id="resetBtn" class="danger" type="button">Fortschritt zurücksetzen</button>
        </div>
      </div>
    </section>

    <section id="quiz" class="screen">
      <header class="topbar">
        <button id="backBtn" class="iconBtn" type="button">←</button>
        <div>
          <div id="modeTitle" class="modeTitle">Lernen</div>
          <div id="questionMeta" class="meta"></div>
        </div>
      </header>

      <div class="card questionCard">
        <div class="statsRow">
          <span id="counter">Frage 1</span>
          <span id="score">✓ 0 ✕ 0</span>
        </div>
        <div class="bar small"><div id="quizBar"></div></div>
        <div id="multiHint" class="meta hidden"></div>
        <img id="questionImage" class="questionImage hidden" alt="" />
        <h2 id="questionText"></h2>
        <div id="answers" class="answers"></div>
        <button id="checkBtn" class="primary hidden" type="button">Prüfen</button>
        <div id="feedback" class="feedback hidden"></div>
        <button id="nextBtn" class="primary hidden" type="button">Weiter →</button>
      </div>
    </section>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
